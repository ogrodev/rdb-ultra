global
    maxconn 4096
    nbthread 1

defaults
    mode http
    option http-keep-alive
    timeout connect 200ms
    timeout client 2s
    timeout server 2s
    timeout check 2s

frontend fraud_detection
    bind *:9999
    default_backend api_instances

backend api_instances
    balance roundrobin
    http-reuse always
    option httpchk GET /ready
    http-check expect status 200
    server api1 api1:8080 check inter 2s fall 3 rise 1 maxconn 256
    server api2 api2:8080 check inter 2s fall 3 rise 1 maxconn 256
